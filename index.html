<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Lumina Beauty</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee2b5b", 
                        "secondary": "#a2c1a6", 
                        "background-light": "#fffafb",
                        "background-dark": "#2a151b",
                        "surface-dark": "#3e1f28",
                        "accent-pink": "#f4e4e9",
                        "primary-content": "#ffffff",
                        "primary-dark": "#c21d46",
                        "primary-light": "#f56e91",
                        "surface-border": "#48232c",
                        "text-muted": "#c992a0",
                        "surface-light": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Plus Jakarta Sans", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "1.5rem", "xl": "2.5rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display antialiased overflow-x-hidden">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/history@5/umd/history.development.js"></script>
    <script src="https://unpkg.com/react-router@6.3.0/umd/react-router.development.js"></script>
    <script src="https://unpkg.com/react-router-dom@6.3.0/umd/react-router-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createRoot } = ReactDOM;
        const { MemoryRouter, Routes, Route, Link, useNavigate } = ReactRouterDOM;

        // --- Shared Components ---

        const Navbar = ({ activePage }) => {
            const navigate = useNavigate();
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            const handleNav = (path) => (e) => {
                e.preventDefault();
                navigate(path);
                setIsMenuOpen(false);
            };

            return (
                <header class="sticky top-0 z-50 flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-[#48232c] px-4 md:px-10 py-4 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
                    <div class="flex items-center gap-3 cursor-pointer" onClick={handleNav('/')}>
                        <div class="size-8 text-primary">
                            <span class="material-symbols-outlined !text-[32px]">spa</span>
                        </div>
                        <h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">Lumina Beauty</h2>
                    </div>
                    
                    <div class="hidden md:flex items-center gap-8">
                        <a onClick={handleNav('/shop')} class={`text-sm font-medium transition-colors cursor-pointer ${activePage === 'shop' ? 'text-primary' : 'text-slate-600 dark:text-slate-200 hover:text-primary dark:hover:text-primary'}`}>Shop</a>
                        <a onClick={handleNav('/about')} class={`text-sm font-medium transition-colors cursor-pointer ${activePage === 'about' ? 'text-primary' : 'text-slate-600 dark:text-slate-200 hover:text-primary dark:hover:text-primary'}`}>About</a>
                        <a class="text-slate-600 dark:text-slate-200 text-sm font-medium hover:text-primary dark:hover:text-primary transition-colors cursor-pointer">Ingredients</a>
                        <a class="text-slate-600 dark:text-slate-200 text-sm font-medium hover:text-primary dark:hover:text-primary transition-colors cursor-pointer">Journal</a>
                    </div>
                    
                    <div class="flex gap-2">
                        <button onClick={handleNav('/shop')} class="hidden sm:flex h-10 px-5 cursor-pointer items-center justify-center rounded-full bg-primary hover:bg-primary/90 transition-colors text-white text-sm font-bold tracking-wide shadow-lg shadow-primary/20">
                            <span>Shop Now</span>
                        </button>
                        <button class="flex size-10 cursor-pointer items-center justify-center rounded-full bg-slate-100 dark:bg-surface-dark text-slate-900 dark:text-white hover:bg-slate-200 dark:hover:bg-[#5a2e3a] transition-colors">
                            <span class="material-symbols-outlined text-[20px]">search</span>
                        </button>
                        <button class="flex size-10 cursor-pointer items-center justify-center rounded-full bg-slate-100 dark:bg-surface-dark text-slate-900 dark:text-white hover:bg-slate-200 dark:hover:bg-[#5a2e3a] transition-colors relative">
                            <span class="material-symbols-outlined text-[20px]">shopping_bag</span>
                            <span class="absolute top-0 right-0 size-2.5 bg-primary rounded-full border border-background-light dark:border-background-dark"></span>
                        </button>
                        <button onClick={() => setIsMenuOpen(!isMenuOpen)} class="md:hidden flex size-10 cursor-pointer items-center justify-center rounded-full bg-slate-100 dark:bg-surface-dark text-slate-900 dark:text-white">
                            <span class="material-symbols-outlined text-[20px]">menu</span>
                        </button>
                    </div>

                    {/* Mobile Menu */}
                    {isMenuOpen && (
                        <div className="absolute top-full left-0 w-full bg-background-light dark:bg-background-dark border-b border-slate-200 dark:border-[#48232c] p-4 flex flex-col gap-4 md:hidden shadow-xl">
                            <a onClick={handleNav('/shop')} className="text-lg font-medium">Shop</a>
                            <a onClick={handleNav('/about')} className="text-lg font-medium">About</a>
                            <a className="text-lg font-medium">Ingredients</a>
                            <a className="text-lg font-medium">Journal</a>
                        </div>
                    )}
                </header>
            );
        };

        const Footer = () => {
            const navigate = useNavigate();
            const handleNav = (path) => (e) => {
                e.preventDefault();
                navigate(path);
            };

            return (
                <footer class="border-t border-slate-200 dark:border-[#48232c] px-4 md:px-10 py-12 bg-slate-50 dark:bg-[#1f0e12]">

                        <div class="col-span-2 md:col-span-1 flex flex-col gap-4">

                                    <span class="material-symbols-outlined">spa</span>
                                </div>
                                <span class="text-xl font-bold text-slate-900 dark:text-white">Lumina</span>
                            </div>

                            </p>

                            <a onClick={handleNav('/shop')} class="text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors text-sm cursor-pointer">Makeup</a>
                            <a class="text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors text-sm cursor-pointer">Sets & Gifts</a>
                        </div>
                        <div class="flex flex-col gap-4">
                            <h4 class="text-slate-900 dark:text-white font-bold">About</h4>
                            <a onClick={handleNav('/about')} class="text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors text-sm cursor-pointer">Our Story</a>
                            <a class="text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors text-sm cursor-pointer">Ingredients</a>
                            <a class="text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors text-sm cursor-pointer">Sustainability</a>
                        </div>
                        <div class="flex flex-col gap-4">
                            <h4 class="text-slate-900 dark:text-white font-bold">Support</h4>
                            <a class="text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors text-sm cursor-pointer">FAQ</a>
                            <a class="text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors text-sm cursor-pointer">Contact Us</a>
                        </div>
                    </div>
                    <div class="max-w-[1440px] mx-auto flex flex-col md:flex-row justify-between items-center gap-4 pt-8 border-t border-slate-200 dark:border-[#48232c]">
                        <p class="text-xs text-slate-500 dark:text-slate-400">© 2024 Lumina Beauty. All rights reserved.</p>
                        <div class="flex gap-4">
                            <a class="text-slate-400 hover:text-primary transition-colors cursor-pointer"><span class="sr-only">Instagram</span>
                                <svg aria-hidden="true" class="h-5 w-5" fill="currentColor" viewbox="0 0 24 24"><path clip-rule="evenodd" d="M12.315 2c2.43 0 2.784.013 3.808.06 1.064.049 1.791.218 2.427.465a4.902 4.902 0 011.772 1.153 4.902 4.902 0 011.153 1.772c.247.636.416 1.363.465 2.427.048 1.067.06 1.407.06 4.123v.08c0 2.643-.012 2.987-.06 4.043-.049 1.064-.218 1.791-.465 2.427a4.902 4.902 0 01-1.153 1.772 4.902 4.902 0 01-1.772 1.153c-.636.247-1.363.416-2.427.465-1.067.048-1.407.06-4.123.06h-.08c-2.643 0-2.987-.012-4.043-.06-1.064-.049-1.791-.218-2.427-.465a4.902 4.902 0 01-1.772-1.153 4.902 4.902 0 01-1.153-1.772c-.247-.636-.416-1.363-.465-2.427-.047-1.024-.06-1.379-.06-3.808v-.63c0-2.43.013-2.784.06-3.808.049-1.064.218-1.791.465-2.427a4.902 4.902 0 011.153-1.772 4.902 4.902 0 011.772-1.153c.636-.247 1.363-.416 2.427-.465C9.673 2.013 10.03 2 12.488 2h-.173zM12.315 12.984a.984.984 0 110-1.968.984.984 0 010 1.968zm4.49-4.49a.984.984 0 110-1.968.984.984 0 010 1.968zM12.315 5.895c-3.542 0-6.42 2.878-6.42 6.42s2.878 6.42 6.42 6.42 6.42-2.878 6.42-6.42-2.878-6.42-6.42-6.42z" fill-rule="evenodd"></path></svg>
                            </a>
                        </div>
                    </div>
                </footer>
            );
        };

        const Newsletter = () => (
            <div class="px-4 md:px-10 pb-20 pt-10 text-center">
                <div class="max-w-2xl mx-auto flex flex-col items-center gap-6">
                    <span class="material-symbols-outlined text-4xl text-primary">mail</span>
                    <h2 class="text-3xl font-bold text-slate-900 dark:text-white">Join the Inner Circle</h2>
                    <p class="text-slate-600 dark:text-slate-300">Subscribe to receive updates, access to exclusive deals, and more.</p>
                    <div class="flex w-full max-w-md gap-2">
                        <input class="flex-1 h-12 px-4 rounded-full border border-slate-300 dark:border-slate-600 bg-transparent text-slate-900 dark:text-white focus:outline-none focus:border-primary dark:focus:border-primary" placeholder="Enter your email" type="email"/>
                        <button class="h-12 px-6 rounded-full bg-primary text-white font-bold hover:bg-rose-600 transition-colors">
                            Subscribe
                        </button>
                    </div>
                </div>
            </div>
        );

                                            <span class="uppercase tracking-[0.2em] text-white text-xs font-bold bg-white/10 backdrop-blur-md px-4 py-1.5 rounded-full w-fit mx-auto border border-white/20">New Collection Spring '24</span>

                                            </h1>
                                            <p class="text-slate-100 text-lg md:text-xl font-medium leading-relaxed max-w-[600px] mx-auto drop-shadow-sm">
                                                Discover our range of ethically sourced, natural cosmetics designed to enhance your natural glow without compromise.
                                            </p>
                                            <div class="flex gap-4 justify-center mt-4">
                                                <button onClick={() => navigate('/shop')} class="h-12 px-8 rounded-full bg-primary text-white text-base font-bold hover:bg-rose-600 transition-all shadow-lg shadow-primary/30 transform hover:scale-105 active:scale-95">
                                                    Shop Collection
                                                </button>
                                                <button onClick={() => navigate('/about')} class="h-12 px-8 rounded-full bg-white/20 backdrop-blur-sm border border-white/30 text-white text-base font-bold hover:bg-white/30 transition-all">
                                                    Learn More
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                {/* Brand Values Section */}
                                <div class="flex flex-col gap-10 px-4 md:px-10 py-16">
                                    <div class="flex flex-col md:flex-row gap-8 justify-between items-end">
                                        <div class="flex flex-col gap-4 max-w-[600px]">
                                            <h2 class="text-slate-900 dark:text-white text-3xl md:text-4xl font-bold leading-tight">
                                                Beauty Without Compromise
                                            </h2>
                                            <p class="text-slate-600 dark:text-slate-300 text-lg leading-relaxed">
                                                We believe that what you put on your skin matters. That's why we've committed to three core pillars in everything we create.
                                            </p>
                                        </div>
                                        <a onClick={() => navigate('/about')} class="text-primary font-bold flex items-center gap-1 hover:gap-2 transition-all cursor-pointer">
                                            Read our full manifesto <span class="material-symbols-outlined text-sm">arrow_forward</span>
                                        </a>
                                    </div>
                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        {[
                                            { icon: 'pets', color: 'pink', title: 'Cruelty Free', desc: 'Never tested on animals, always kind. We represent beauty with a conscience.' },
                                            { icon: 'eco', color: 'green', title: 'Vegan Ingredients', desc: '100% plant-based formulas packed with botanicals for healthy, radiant skin.' },
                                            { icon: 'recycling', color: 'blue', title: 'Sustainable Packaging', desc: 'Recycled materials and plastic-free shipping to protect our beautiful planet.' }
                                        ].map((item, index) => (
                                            <div key={index} class="group flex flex-col gap-4 rounded-2xl border border-slate-100 dark:border-[#48232c] bg-white dark:bg-surface-dark p-8 hover:shadow-xl hover:border-primary/20 transition-all duration-300">
                                                <div class={`size-12 rounded-full bg-${item.color}-50 dark:bg-surface-dark flex items-center justify-center text-${item.color}-500 dark:text-${item.color}-300 group-hover:scale-110 transition-transform`}>
                                                    <span class="material-symbols-outlined text-[28px]">{item.icon}</span>
                                                </div>
                                                <div class="flex flex-col gap-2">
                                                    <h3 class="text-slate-900 dark:text-white text-xl font-bold">{item.title}</h3>
                                                    <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">{item.desc}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                {/* Featured Products */}
                                <div class="w-full bg-slate-50 dark:bg-[#1f0e12] py-20">
                                    <div class="px-4 md:px-10 max-w-[1440px] mx-auto">
                                        <div class="flex justify-between items-center mb-10">
                                            <h2 class="text-slate-900 dark:text-white text-3xl font-bold tracking-tight">Trending Now</h2>
                                            <div class="flex gap-2">
                                                <button class="size-10 rounded-full border border-slate-200 dark:border-[#48232c] flex items-center justify-center hover:bg-slate-100 dark:hover:bg-[#48232c] text-slate-900 dark:text-white transition-colors">
                                                    <span class="material-symbols-outlined">arrow_back</span>
                                                </button>
                                                <button class="size-10 rounded-full border border-slate-200 dark:border-[#48232c] flex items-center justify-center bg-slate-900 dark:bg-white text-white dark:text-slate-900 hover:opacity-90 transition-opacity">
                                                    <span class="material-symbols-outlined">arrow_forward</span>
                                                </button>
                                            </div>
                                        </div>
                                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                            {[
                                                { name: "Hydrating Serum", price: "$45.00", desc: "With Hyaluronic Acid", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuBL3uUroIGN-VzG4_7lvYiEKU-3cHclvFbcflo5L8678b0L6lJNt_IcibN1RkTT92n-B7FBXtIEAU-2hf36mI6Yx9QB-rO9DjSOMqO8-5w6_Ndympn7V0AHZJkWxlMiL3Rv0m9DgZj0xJMceigWr4JWKpG2xdLykGoQG_4uoggo9bO6HktKgAfeA0qa0Qf7zDGWTwC7b1G7Cvi13d1nXz4PKqGDZYxNFOXSGzRyttMo89SDevHdc00wKu9AjCqmCFEZ1QCx7B0_NZE", badge: "Best Seller" },
                                                { name: "Night Recovery Cream", price: "$52.00", desc: "Deep repair formula", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuAYzTBVelz206s6ZSFG9r8IgQHX7yjJG2JNCZf_5mLwMVlN4UQ4dJV6PzcLzz2FrtB0Jxgqxbv8oF0sNGuPELQwAazX06nOJtKPPbGJh7oJNoGBK3K9BZVipYJNEexBC-YRrh54PWeB4D1PvgUSxZYtJ_NaoYSy6T-FB8YLZqIzwyMXG-xnorwOIm53auOAq2rzdYQ4f046aX2V-E0W67L4h-ZH3yM5SuYEQm2HZf59vwo6_m5h6hgOQ50YA0YgwuU2eFSctSOP8nY", badge: null },
                                                { name: "Velvet Matte Lip", price: "$24.00", desc: "Long-lasting color", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuCqUzzVU28TwZkO24rrqbzjxIqnYG5aXfl74K3IYSgUo0duddbRuyMm7BM9j370sCz9favRTzGPvKKtNOqdUokC8uWxadz7QcxV-RSZMjhBhp_nNXntnxJLDCkSpEUf3aI_2e2DoyxxiMv4UD1D1yyL0_mkCxSVyobhZxX2KPH61tuNxmi2YGcqMuLfhumwVxndqy3NG7JRVcz4CEM2xTaxelp5_2wONpaI-km4g6Jw7VbkU25SlKZMO_MP3rZ-688n4MiWKiuOH0Y", badge: "New" },
                                                { name: "Rose Water Mist", price: "$30.00", desc: "Refreshing hydration", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuAlPcpevtmpKjSzJPXNM1sdmSM-s8AGNlAZzNttYFKFmFperH9zrIChcovMZNX7FBmu8xDgPKuKDVF75fsAxP6RauIiN32KBcckVySleclWLFA8DlO8Eq6MJPwGyf8Rbl-_Ji5b3nYSqu_qdvC-QtQUL9OnKgebaoFswZgL-aUK1HQufuz-yj4DATRLY00dmzCf_C6b3rnQ-vV3V510dhRee-n2ShKW_0O61Mt1ySEIdInHg6awd3Kk86oJSflIuONDJJXURBJh_zU", badge: null }
                                            ].map((prod, idx) => (
                                                <div key={idx} class="group flex flex-col gap-4 cursor-pointer" onClick={() => navigate('/shop')}>
                                                    <div class="relative w-full aspect-[3/4] overflow-hidden rounded-2xl bg-slate-200">
                                                        <div class="absolute inset-0 bg-cover bg-center transition-transform duration-700 group-hover:scale-110" style={{backgroundImage: `url("${prod.img}")`}}></div>
                                                        {prod.badge && <span class={`absolute top-3 left-3 ${prod.badge === 'New' ? 'bg-primary text-white' : 'bg-white/90 text-slate-900'} backdrop-blur-sm text-xs font-bold px-2 py-1 rounded`}>{prod.badge}</span>}
                                                        <button class="absolute bottom-4 right-4 size-10 bg-white text-slate-900 rounded-full flex items-center justify-center opacity-0 translate-y-4 group-hover:opacity-100 group-hover:translate-y-0 transition-all duration-300 shadow-lg hover:bg-primary hover:text-white">

                                <div class="w-full px-4 md:px-10 py-16">

                                        <div class="flex flex-col md:flex-row items-center">
                                            <div class="flex-1 p-8 md:p-16 flex flex-col justify-center items-start gap-6">
                                                <div class="flex items-center gap-2 text-slate-800 dark:text-slate-200 font-bold uppercase tracking-widest text-sm">
                                                    <span class="w-8 h-[2px] bg-current"></span>
                                                    <span>Our Philosophy</span>
                                                </div>
                                                <h2 class="text-4xl md:text-5xl font-black text-slate-900 dark:text-white leading-[1.1]">
                                                    Nature's Best,<br/>Bottled for You.
                                                </h2>
                                                <p class="text-slate-700 dark:text-slate-300 text-lg max-w-[400px]">
                                                    We source the finest botanical ingredients from around the world to create potent formulas that work in harmony with your skin.
                                                </p>
                                                <button onClick={() => navigate('/about')} class="mt-4 px-8 py-3 bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-full font-bold hover:opacity-90 transition-opacity">

                                ))}
                            </div>
                            {/* Pagination */}
                            <div class="flex items-center justify-center p-4 mt-12">
                                <nav class="flex items-center gap-2">
                                    <a class="flex size-10 items-center justify-center rounded-full border border-slate-200 dark:border-surface-dark hover:bg-surface-light dark:hover:bg-surface-dark text-slate-500 dark:text-slate-400 transition-colors" href="#">
                                        <span class="material-symbols-outlined text-[18px]">chevron_left</span>
                                    </a>
                                    <a class="flex size-10 items-center justify-center rounded-full bg-primary text-white text-sm font-bold shadow-lg shadow-primary/25" href="#">1</a>
                                    <a class="flex size-10 items-center justify-center rounded-full border border-transparent hover:bg-surface-light dark:hover:bg-surface-dark text-slate-500 dark:text-slate-400 text-sm font-medium transition-colors" href="#">2</a>
                                    <span class="flex size-10 items-center justify-center text-slate-400 text-sm">...</span>
                                    <a class="flex size-10 items-center justify-center rounded-full border border-slate-200 dark:border-surface-dark hover:bg-surface-light dark:hover:bg-surface-dark text-slate-500 dark:text-slate-400 transition-colors" href="#">
                                        <span class="material-symbols-outlined text-[18px]">chevron_right</span>
                                    </a>
                                </nav>
                            </div>
                        </div>
                    </main>
                    <section class="border-t border-slate-200 dark:border-surface-dark bg-background-light dark:bg-background-dark py-12 lg:py-16">
                        <div class="layout-content-container max-w-[1200px] mx-auto px-4 lg:px-8">
                            <div class="bg-surface-light dark:bg-surface-dark rounded-3xl p-8 lg:p-12 flex flex-col md:flex-row items-center justify-between gap-8 relative overflow-hidden">
                                <div class="absolute top-0 right-0 -mt-10 -mr-10 w-64 h-64 bg-primary/10 rounded-full blur-3xl"></div>
                                <div class="absolute bottom-0 left-0 -mb-10 -ml-10 w-64 h-64 bg-primary/10 rounded-full blur-3xl"></div>
                                <div class="flex flex-col gap-4 max-w-lg relative z-10">
                                    <h3 class="text-2xl md:text-3xl font-bold text-slate-900 dark:text-white">Join the Lumina Club</h3>
                                    <p class="text-slate-500 dark:text-slate-300">Subscribe to receive updates, access to exclusive deals, and more.</p>
                                </div>
                                <div class="w-full max-w-md relative z-10">
                                    <form class="flex flex-col sm:flex-row gap-3">
                                        <input class="flex-1 bg-background-light dark:bg-background-dark border-transparent focus:border-primary focus:ring-0 rounded-xl px-4 py-3 text-slate-900 dark:text-white placeholder:text-slate-400" placeholder="Enter your email" type="email"/>
                                        <button class="bg-primary hover:bg-primary/90 text-white font-bold py-3 px-6 rounded-xl transition-colors whitespace-nowrap" type="button">
                                            Subscribe
                                        </button>
                                    </form>
                                    <p class="text-xs text-slate-400 mt-3 text-center sm:text-left">By subscribing you agree to our <a class="underline hover:text-primary" href="#">Privacy Policy</a>.</p>
                                </div>
                            </div>
                        </div>
                    </section>
                    <Footer />
                </div>
            );
        };


        // --- App Shell ---

        const App = () => {
            return (
                <MemoryRouter>
                    <Routes>
                        <Route path="/" element={<HomePage />} />
                        <Route path="/about" element={<AboutPage />} />
                        <Route path="/shop" element={<ShopPage />} />
                    </Routes>
                </MemoryRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
